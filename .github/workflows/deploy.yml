name: Build and Deploy to GitHub Pages

on:
  # Manual trigger only - run this for initial deployment
  # Weekly updates are handled by weekly-update.yml
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Copy config for Astro
        run: cp .env.template .env

      - name: Validate configuration
        run: npm run validate-config

      - name: Fetch PubMed papers
        run: npm run fetch-pubmed -- --seed
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Fetch clinical trials
        run: npm run fetch-trials
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Build OpenAlex profiles
        run: npm run build-profiles
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}

      - name: Build Astro site
        run: npm run build
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
