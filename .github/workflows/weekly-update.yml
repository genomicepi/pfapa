name: Weekly Data Update

on:
  # Run every Saturday at 5 AM UTC
  schedule:
    - cron: '0 5 * * 6'

  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  update-data:
    outputs:
      changes: ${{ steps.check_changes.outputs.changes }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Copy config for Astro
        run: cp .env.template .env

      - name: Fetch new PubMed papers (incremental)
        run: npm run fetch-pubmed
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Fetch clinical trials updates
        run: npm run fetch-trials
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Update OpenAlex profiles
        run: npm run build-profiles
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}

      - name: Check for changes
        id: check_changes
        run: |
          if [[ -n $(git status -s src/data/) ]]; then
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit updated data
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add src/data/*.json
          git commit -m "chore: automated weekly data update [skip ci]" || echo "No changes to commit"
          git push

      - name: Build Astro site
        if: steps.check_changes.outputs.changes == 'true'
        run: npm run build
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Upload artifact
        if: steps.check_changes.outputs.changes == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    if: needs.update-data.outputs.changes == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: update-data
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
